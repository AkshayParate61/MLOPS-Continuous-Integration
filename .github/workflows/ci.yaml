name: CI Workflow

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest # Server OS 

    steps:
    - name: Checkout code  # It could be anything
      uses: actions/checkout@v2 # Keep as it is

    - name: Set up Python   # It could be anything
      uses: actions/setup-python@v2   # Keep as it is
      with:
        python-version: '3.9'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest streamlit

    - name: Run tests   # _test.py contains all test code which need to be run perfectly or not shows error
      run: |
        pytest _test.py  